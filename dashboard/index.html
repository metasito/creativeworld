<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CreativeWorld — Engine Dashboard</title>
<style>
:root {
  color-scheme: light;
  --page: #f9f9f7; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
  --muted: #898781; --grid: #e1e0d9; --border: rgba(11,11,11,.10);
  --accent: #2a78d6; --accent-soft: #cde2fb;
  --good: #0ca30c; --warn: #fab219; --crit: #d03b3b;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark;
    --page: #0d0d0d; --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
    --muted: #898781; --grid: #2c2c2a; --border: rgba(255,255,255,.10);
    --accent: #3987e5; --accent-soft: #184f95;
  }
}
* { box-sizing: border-box; margin: 0; }
body { background: var(--page); color: var(--ink); font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
h1 { font-size: 20px; letter-spacing: -.02em; }
h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin: 22px 0 10px; }
.chip { font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 99px; border: 1px solid var(--border); }
.chip.working { color: var(--good); }
.chip.napping { color: var(--warn); }
.chip.stopped { color: var(--crit); }
#updated { color: var(--muted); font-size: 12px; margin-left: auto; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
/* budget */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
.tile .v { font-size: 26px; font-weight: 650; letter-spacing: -.02em; }
.tile .l { color: var(--muted); font-size: 12px; }
.gauge { margin-top: 12px; }
.gauge .bar { position: relative; height: 14px; border-radius: 7px; background: var(--grid); overflow: hidden; }
.gauge .fill { position: absolute; inset: 0 auto 0 0; width: 0%; background: var(--accent); border-radius: 7px; transition: width .6s ease; }
.gauge .mark { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--muted); }
.gauge .labels { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; margin-top: 4px; }
/* kanban */
.board { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
.col h3 { font-size: 12px; color: var(--ink-2); font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
.col h3 .n { color: var(--muted); font-weight: 400; }
.task { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--grid); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
.col.doing .task { border-left-color: var(--accent); }
.task .t { font-weight: 550; }
.task .m { color: var(--muted); font-size: 11px; margin-top: 2px; }
.task .h { color: var(--ink-2); font-size: 12px; margin-top: 4px; font-style: italic; }
/* projects */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.proj img { width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background: var(--grid); display: block; }
.proj .ph { width: 100%; aspect-ratio: 16/10; border-radius: 6px; border: 1px dashed var(--grid); display: grid; place-items: center; color: var(--muted); font-size: 12px; }
.proj .t { font-weight: 600; margin-top: 8px; }
.proj .d { color: var(--ink-2); font-size: 12px; }
.proj a { color: var(--accent); font-size: 12px; text-decoration: none; }
.proj .st { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
/* journal */
.feed li { border-bottom: 1px solid var(--grid); padding: 8px 0; list-style: none; }
.feed .w { color: var(--muted); font-size: 12px; }
#learn li { color: var(--ink-2); font-size: 13px; list-style: none; padding: 3px 0; }
#learn li::before { content: "◆ "; color: var(--accent); }
.err { color: var(--crit); font-size: 12px; }
/* add-task form */
#addform input, #addform select, #addform button { font: inherit; color: var(--ink);
  background: var(--page); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; }
#addform button { background: var(--accent); color: #fff; border: 0; cursor: pointer; font-weight: 600; }
#addform button:hover { filter: brightness(1.1); }
/* agent activity */
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(1.5); } }
#a-pulse.live { background: var(--good); animation: pulse 1.2s ease-in-out infinite; }
#a-pulse.nap { background: var(--warn); }
#a-log li { font-size: 12px; color: var(--ink-2); padding: 3px 0; border-bottom: 1px solid var(--grid); display:flex; gap:8px; }
#a-log .t { color: var(--muted); flex: none; font-variant-numeric: tabular-nums; }
#a-log .ag { color: var(--accent); flex: none; }
/* drag & drop board */
.task.draggable { cursor: grab; }
.task.dragging { opacity: .45; }
.col.dropzone { outline: 2px dashed var(--accent); outline-offset: 2px; border-radius: 8px; background: var(--accent-soft); }
.task .links { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 5px; }
.task .pr, .task .gh { font-size: 11px; color: var(--accent); text-decoration: none; }
.task .pr:hover, .task .gh:hover { text-decoration: underline; }
.task .gh.new { color: var(--muted); }
/* task modal */
#modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; place-items: center; z-index: 50; padding: 20px; }
#modal.open { display: grid; }
#modal .box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; width: 100%; max-width: 460px; max-height: 90vh; overflow: auto; }
#modal h3 { font-size: 16px; margin-bottom: 2px; }
#modal .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
#modal label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 10px 0 4px; }
#modal .ro { color: var(--ink-2); font-size: 13px; white-space: pre-wrap; }
#modal input, #modal select, #modal textarea { font: inherit; color: var(--ink); background: var(--page);
  border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; width: 100%; }
#modal textarea { resize: vertical; min-height: 52px; }
#modal .row { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
#modal button { font: inherit; border: 0; border-radius: 7px; padding: 8px 14px; cursor: pointer; font-weight: 600; }
#m-save { background: var(--accent); color: #fff; }
#m-close { background: var(--grid); color: var(--ink); margin-left: auto; }
#m-msg { font-size: 12px; color: var(--muted); }
#m-open { color: var(--accent); font-size: 12px; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>CreativeWorld</h1>
  <span id="status" class="chip">…</span>
  <span id="updated"></span>
</header>

<div class="card" id="budget-card">
  <div class="tiles">
    <div class="tile"><div class="v" id="pct">–</div><div class="l">of window budget used</div></div>
    <div class="tile"><div class="v" id="used">–</div><div class="l">weighted tokens spent</div></div>
    <div class="tile"><div class="v" id="reset">–</div><div class="l">until window reset</div></div>
    <div class="tile"><div class="v" id="verdict">–</div><div class="l">engine verdict</div></div>
  </div>
  <div class="gauge">
    <div class="bar"><div class="fill" id="fill"></div><div class="mark" id="m85"></div><div class="mark" id="m95"></div></div>
    <div class="labels"><span>0</span><span id="blabel"></span></div>
  </div>
</div>

<div class="card" id="agentcard" style="margin-top:14px">
  <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap">
    <span id="a-pulse" style="width:10px; height:10px; border-radius:50%; background:var(--muted); flex:none"></span>
    <b id="a-status">IDLE</b>
    <span id="a-task" style="color:var(--ink-2)"></span>
    <span id="a-action" style="color:var(--muted); font-size:13px"></span>
    <span id="a-when" style="margin-left:auto; color:var(--muted); font-size:12px"></span>
  </div>
  <ul id="a-log" style="margin-top:10px; list-style:none; max-height:150px; overflow:auto"></ul>
</div>

<h2>Board</h2>
<div class="card" id="addcard" style="margin-bottom:12px; display:none">
  <form id="addform" style="display:flex; flex-wrap:wrap; gap:8px; align-items:center">
    <input id="f-title" placeholder="Task title (what should the engine build?)" required
           style="flex:2 1 240px; min-width:200px">
    <input id="f-accept" placeholder="Acceptance (optional: how do we know it's done?)"
           style="flex:2 1 240px; min-width:200px">
    <select id="f-size"><option value="S">S</option><option value="M" selected>M</option><option value="L">L</option></select>
    <select id="f-epic"></select>
    <input id="f-newtitle" placeholder="New project title" style="display:none; flex:1 1 160px">
    <input id="f-newslug" placeholder="slug (e.g. lava-lamp)" style="display:none; flex:0 1 140px">
    <label style="font-size:12px; color:var(--muted)"><input type="checkbox" id="f-top" checked> top of queue</label>
    <button type="submit">Add task</button>
    <span id="f-msg" style="font-size:12px; color:var(--muted)"></span>
  </form>
</div>
<div class="board" id="board"></div>

<div id="modal">
  <div class="box">
    <h3 id="m-title"></h3>
    <div class="meta" id="m-meta"></div>
    <label>Acceptance</label>
    <div class="ro" id="m-accept"></div>
    <div id="m-edit">
      <label>Status</label>
      <select id="m-status">
        <option value="backlog">backlog</option>
        <option value="next">next</option>
        <option value="in_progress">in_progress</option>
        <option value="review">review</option>
        <option value="done">done</option>
      </select>
      <label>Handoff / notes</label>
      <textarea id="m-handoff"></textarea>
      <label>GitHub issue #</label>
      <input id="m-issue" placeholder="e.g. 42">
      <label>Merge request / PR link</label>
      <input id="m-pr" placeholder="https://github.com/…/pull/…">
    </div>
    <div id="m-trace" class="ro" style="margin-top:8px"></div>
    <a id="m-open" href="#" target="_blank" style="display:none">open merge request ↗</a>
    <div class="row">
      <button id="m-save">Save</button>
      <span id="m-msg"></span>
      <button id="m-close">Close</button>
    </div>
  </div>
</div>

<h2>Projects</h2>
<div class="gallery" id="gallery"></div>

<h2>Session journal</h2>
<ul class="feed" id="feed"></ul>

<h2>Learnings</h2>
<ul id="learn"></ul>

<script>
const $ = id => document.getElementById(id);
// every state string that reaches innerHTML goes through esc() — task titles etc. are user/agent input
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(2)+"M" : n >= 1e3 ? Math.round(n/1e3)+"k" : String(n);
const hms = s => s == null ? "–" : s <= 0 ? "now" : `${Math.floor(s/3600)}h ${Math.floor(s%3600/60)}m`;
let resetsAt = null, live = true;
let tasksById = {}, epicsById = {}, dragging = false, dragId = null, currentId = null;
let repoUrl = null;
function newIssueUrl(t) {
  const body = `Task ${t.id} (${t.size}) · epic ${epicsById[t.epic] || t.epic}\n\nAcceptance: ${t.acceptance || "—"}`;
  return `${repoUrl}/issues/new?title=${encodeURIComponent("[" + t.id + "] " + t.title)}&body=${encodeURIComponent(body)}`;
}
function issueLink(t) {
  if (!repoUrl) return "";
  if (t.issue) return `<a class="gh" href="${repoUrl}/issues/${esc(t.issue)}" target="_blank" rel="noopener">● #${esc(t.issue)}</a>`;
  return `<a class="gh new" href="${newIssueUrl(t)}" target="_blank" rel="noopener">＋ open issue</a>`;
}
function commitLink(t) {
  if (!repoUrl || !t.commit) return "";
  return `<a class="pr commit" href="${repoUrl}/commit/${esc(t.commit)}" target="_blank" rel="noopener" title="commit ${esc(t.commit)}">⎇ ${esc(t.commit)}</a>`;
}

async function fetchState() {
  try {
    const r = await fetch("/api/state", {cache: "no-store"});
    if (r.ok) { live = true; return r.json(); }
  } catch (e) {}
  live = false;
  return (await fetch("data.json", {cache: "no-store"})).json(); // static fallback
}

function render(d) {
  const b = d.budget;
  repoUrl = d.repo_url || null;
  $("pct").textContent = b.pct.toFixed(1) + "%";
  $("used").textContent = fmt(b.used);
  resetsAt = b.resets_at ? new Date(b.resets_at) : null;
  tickReset();
  $("verdict").textContent = b.verdict;
  $("verdict").style.color = b.verdict === "CONTINUE" ? "var(--good)" : b.verdict === "WRAP_UP" ? "var(--warn)" : "var(--crit)";
  $("fill").style.width = Math.min(100, b.pct) + "%";
  $("fill").style.background = b.pct >= b.stop_pct ? "var(--crit)" : b.pct >= b.wrap_up_pct ? "var(--warn)" : "var(--accent)";
  $("m85").style.left = b.wrap_up_pct + "%"; $("m95").style.left = b.stop_pct + "%";
  $("blabel").textContent = "budget " + fmt(b.budget) + " (⚑" + b.wrap_up_pct + "% wrap · ⚑" + b.stop_pct + "% stop)";

  renderAgent(d.activity, b, d.queue.in_progress);

  const working = b.verdict === "CONTINUE" && d.queue.in_progress;
  const st = $("status");
  st.textContent = working ? "● WORKING on " + d.queue.in_progress
    : b.verdict === "STOP" ? "◌ NAPPING — resumes " + (resetsAt ? resetsAt.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"}) : "on reset")
    : d.queue.in_progress ? "● ON TASK " + d.queue.in_progress : "○ IDLE";
  st.className = "chip " + (working ? "working" : b.verdict === "STOP" ? "stopped" : "napping");

  epicsById = Object.fromEntries(d.epics.map(e => [e.id, e.title]));
  tasksById = Object.fromEntries(d.tasks.map(t => [t.id, t]));
  const cols = [["in_progress", "In progress", "doing"], ["next", "Next up", ""], ["backlog", "Backlog", ""], ["done", "Done", ""]];
  const order = Object.fromEntries(d.queue.next.map((id, i) => [id, i]));
  if (!dragging) $("board").innerHTML = cols.map(([s, label, cls]) => {
    let ts = d.tasks.filter(t => t.status === s || (s === "backlog" && t.status === "review"));
    if (s === "next") ts.sort((a, z) => (order[a.id] ?? 99) - (order[z.id] ?? 99));
    if (s === "done") ts = ts.slice(-6).reverse();
    return `<div class="col ${cls}" data-status="${s}"><h3>${label} <span class="n">${ts.length}</span></h3>` +
      ts.map(t => `<div class="task${live ? " draggable" : ""}"${live ? " draggable=\"true\"" : ""} data-id="${esc(t.id)}">
        <div class="t">${esc(t.title)}</div>
        <div class="m">${esc(t.id)} · ${esc(t.size)} · ${esc(epicsById[t.epic] || t.epic)}</div>
        ${t.handoff && s !== "done" ? `<div class="h">${esc(t.handoff)}</div>` : ""}
        <div class="links">${issueLink(t)}${commitLink(t)}${t.pr ? `<a class="pr" href="${esc(t.pr)}" target="_blank" rel="noopener">↗ merge request</a>` : ""}</div></div>`).join("") + "</div>";
  }).join("");

  $("gallery").innerHTML = d.projects.map(p => `<div class="card proj">
    ${p.shot ? `<img src="/projects/${esc(p.slug)}/shot.png?${Date.now() % 1e5}" alt="${esc(p.title)}">` : `<div class="ph">not built yet</div>`}
    <div class="t">${esc(p.title)}</div><div class="st">${esc(p.status)}</div><div class="d">${esc(p.description)}</div>
    ${p.url ? `<a href="${esc(p.url)}" target="_blank">open ↗</a>` : ""}</div>`).join("");

  $("feed").innerHTML = d.sessions.slice().reverse().map(s => `<li>
    <div>${esc(s.did)}</div><div class="w">${esc(s.started)}${s.ended ? " → " + esc(s.ended) : " · ongoing"}${s.stopped_because ? " · stopped: " + esc(s.stopped_because) : ""}</div></li>`).join("");

  $("learn").innerHTML = d.learnings.map(l => `<li>${esc(l)}</li>`).join("");
  syncForm(d);
  updateTab(b);
  $("updated").textContent = (live ? "live · " : "static snapshot · ") + new Date().toLocaleTimeString();
}

/* ---- background-tab monitoring: budget in the title, verdict as favicon dot ---- */
const favLink = document.createElement("link");
favLink.rel = "icon";
document.head.appendChild(favLink);
function updateTab(b) {
  document.title = `${b.pct.toFixed(0)}% ${b.verdict} — CreativeWorld`;
  const c = document.createElement("canvas"); c.width = c.height = 32;
  const x = c.getContext("2d");
  x.beginPath(); x.arc(16, 16, 13, 0, 7);
  x.fillStyle = b.verdict === "CONTINUE" ? "#0ca30c" : b.verdict === "WRAP_UP" ? "#fab219" : "#d03b3b";
  x.fill();
  // fill level as a darker pie from 12 o'clock
  x.beginPath(); x.moveTo(16, 16);
  x.arc(16, 16, 13, -Math.PI / 2, -Math.PI / 2 + 2 * Math.PI * Math.min(1, b.pct / 100));
  x.closePath(); x.fillStyle = "rgba(0,0,0,.45)"; x.fill();
  favLink.href = c.toDataURL("image/png");
}

/* ---- add-task form (only in live server mode) ---- */
const fEpic = $("f-epic");
function syncForm(d) {
  $("addcard").style.display = live ? "" : "none";
  if (!live) return;
  const cur = fEpic.value;
  fEpic.innerHTML = d.epics.map(e => `<option value="${esc(e.id)}">${esc(e.title)}</option>`).join("")
    + `<option value="__new__">➕ new project…</option>`;
  if ([...fEpic.options].some(o => o.value === cur)) fEpic.value = cur;
}
fEpic.addEventListener("change", () => {
  const isNew = fEpic.value === "__new__";
  $("f-newtitle").style.display = isNew ? "" : "none";
  $("f-newslug").style.display = isNew ? "" : "none";
});
$("addform").addEventListener("submit", async e => {
  e.preventDefault();
  const isNew = fEpic.value === "__new__";
  const body = {
    title: $("f-title").value, acceptance: $("f-accept").value,
    size: $("f-size").value, top: $("f-top").checked,
    epic: isNew ? "" : fEpic.value,
    new_epic: isNew ? { title: $("f-newtitle").value, slug: $("f-newslug").value } : null
  };
  const r = await fetch("/api/task", { method: "POST", body: JSON.stringify(body) });
  const j = await r.json();
  $("f-msg").textContent = j.ok ? `✓ ${j.task} queued` : `✗ ${j.error}`;
  if (j.ok) { $("f-title").value = ""; $("f-accept").value = ""; $("f-newtitle").value = ""; $("f-newslug").value = ""; }
});

function renderAgent(a, b, inprog) {
  a = a || {engine_status: "idle", log: []};
  const upd = a.updated ? new Date(a.updated) : null;
  const ageSec = upd ? (Date.now() - upd) / 1000 : Infinity;
  // heartbeat fresh (<90s) = live. Stale + a task in_progress = agent quietly
  // mid-task (heartbeats land at milestones, not continuously) — NOT idle.
  let status = a.engine_status || "idle";
  if (status === "working" && ageSec > 90) status = inprog ? "quiet" : "stale";
  const pulse = $("a-pulse");
  pulse.className = status === "working" ? "live" : status === "napping" || status === "quiet" ? "nap" : "";
  $("a-status").textContent = status === "working" ? "● WORKING"
    : status === "quiet" ? `● WORKING — quiet ${Math.round(ageSec / 60)}m`
    : status === "napping" ? "◌ NAPPING"
    : status === "stale" ? "○ IDLE (no agent)" : "○ IDLE";
  $("a-status").style.color = status === "working" ? "var(--good)"
    : status === "quiet" || status === "napping" ? "var(--warn)" : "var(--muted)";
  $("a-task").textContent = a.current_task ? `on ${a.current_task}` : inprog && status === "quiet" ? `on ${inprog}` : "";
  $("a-action").textContent = a.current_action || (status === "stale" || status === "idle" ? "no autopilot running — launch: python engine/autopilot.py" : "");
  $("a-when").textContent = upd ? "heartbeat " + timeago(ageSec) : "no heartbeat yet";
  $("a-log").innerHTML = (a.log || []).slice().reverse().map(e =>
    `<li><span class="t">${e.at ? new Date(e.at).toLocaleTimeString() : ""}</span>
     <span class="ag">${esc(e.agent || "engine")}</span><span>${esc(e.msg)}</span></li>`).join("");
}
const timeago = s => s === Infinity ? "never" : s < 60 ? Math.round(s)+"s ago" : Math.round(s/60)+"m ago";

/* ---- board drag & drop + task modal (delegated, bound once) ---- */
const board = $("board");
async function postUpdate(body) {
  try {
    const r = await fetch("/api/task/update", { method: "POST", body: JSON.stringify(body) });
    if (!r.ok) return;
    render(await fetchState()); // reflect server truth immediately
  } catch (e) {}
}
function afterElement(col, y) {
  return [...col.querySelectorAll(".task:not(.dragging)")]
    .find(el => { const r = el.getBoundingClientRect(); return y < r.top + r.height / 2; });
}
function clearDropzones() { board.querySelectorAll(".dropzone").forEach(c => c.classList.remove("dropzone")); }

board.addEventListener("dragstart", e => {
  const card = e.target.closest(".task"); if (!card || !live) return;
  dragId = card.dataset.id; dragging = true;
  card.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
});
board.addEventListener("dragend", () => {
  dragging = false; dragId = null; clearDropzones();
  board.querySelectorAll(".dragging").forEach(c => c.classList.remove("dragging"));
});
board.addEventListener("dragover", e => {
  const col = e.target.closest(".col"); if (!col || !dragId) return;
  e.preventDefault();
  clearDropzones(); col.classList.add("dropzone");
  if (col.dataset.status === "next") {
    const card = board.querySelector(`.task[data-id="${dragId}"]`);
    const after = afterElement(col, e.clientY);
    if (after) col.insertBefore(card, after); else col.appendChild(card);
  }
});
board.addEventListener("drop", e => {
  e.preventDefault();
  const col = e.target.closest(".col"); clearDropzones();
  if (!col || !dragId) return;
  const status = col.dataset.status;
  const order = [...board.querySelectorAll('.col[data-status="next"] .task')].map(x => x.dataset.id);
  const id = dragId; dragging = false; dragId = null;
  postUpdate({ id, status, order });
});
board.addEventListener("click", e => {
  if (e.target.closest("a")) return;          // let PR links open
  const card = e.target.closest(".task"); if (!card) return;
  const t = tasksById[card.dataset.id]; if (t) openModal(t);
});

function openModal(t) {
  currentId = t.id;
  $("m-title").textContent = t.title;
  $("m-meta").textContent = `${t.id} · ${t.size} · ${epicsById[t.epic] || t.epic} · ${t.status}`;
  $("m-accept").textContent = t.acceptance || "—";
  $("m-status").value = t.status;
  $("m-handoff").value = t.handoff || "";
  $("m-issue").value = t.issue || "";
  $("m-pr").value = t.pr || "";
  const trace = $("m-trace");
  if (repoUrl) {
    const iss = t.issue
      ? `<a href="${repoUrl}/issues/${esc(t.issue)}" target="_blank" rel="noopener">issue #${esc(t.issue)}</a>`
      : `<a href="${newIssueUrl(t)}" target="_blank" rel="noopener">＋ open a GitHub issue for this task</a>`;
    const pr = t.pr ? ` → <a href="${esc(t.pr)}" target="_blank" rel="noopener">merge request ↗</a>` : "";
    const commit = t.commit ? ` · shipped in <a href="${repoUrl}/commit/${esc(t.commit)}" target="_blank" rel="noopener">${esc(t.commit)} ⎇</a>` : "";
    trace.innerHTML = "GitHub: " + iss + pr + commit;
  } else trace.textContent = "";
  const link = $("m-open");
  if (t.pr) { link.href = t.pr; link.style.display = ""; } else link.style.display = "none";
  $("m-edit").style.display = live ? "" : "none";
  $("m-save").style.display = live ? "" : "none";
  $("m-msg").textContent = live ? "" : "read-only — static snapshot";
  $("modal").classList.add("open");
}
$("m-save").onclick = async () => {
  const r = await fetch("/api/task/update", { method: "POST", body: JSON.stringify({
    id: currentId, status: $("m-status").value,
    handoff: $("m-handoff").value, pr: $("m-pr").value, issue: $("m-issue").value }) });
  const j = await r.json();
  $("m-msg").textContent = j.ok ? "✓ saved" : "✗ " + j.error;
  if (j.ok) { render(await fetchState()); setTimeout(() => $("modal").classList.remove("open"), 400); }
};
$("m-close").onclick = () => $("modal").classList.remove("open");
$("modal").onclick = e => { if (e.target.id === "modal") $("modal").classList.remove("open"); };

function tickReset() {
  $("reset").textContent = resetsAt ? hms((resetsAt - Date.now()) / 1000) : "–";
}

async function loop() {
  try { render(await fetchState()); } catch (e) { $("updated").innerHTML = `<span class="err">state unavailable: ${e.message}</span>`; }
  setTimeout(loop, live ? 2000 : 10000);
}
setInterval(tickReset, 1000);
loop();
</script>
</body>
</html>
