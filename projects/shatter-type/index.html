<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shatter Type</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0b12}
  canvas{display:block;width:100vw;height:100vh}
  #hint{position:fixed;left:0;right:0;bottom:18px;text-align:center;
    font:14px/1.4 ui-monospace,Consolas,monospace;color:#5a5a72;
    letter-spacing:.12em;pointer-events:none;user-select:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">TYPE A WORD &mdash; EVERY KEYSTROKE SHATTERS IT &middot; ENTER CLEARS &middot; TAB CYCLES THEME</div>
<script>
(() => {
'use strict';
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const q = new URLSearchParams(location.search);
const DEMO = q.get('demo') === '1';

// deterministic RNG (mulberry32) when ?seed= given
let seedVal = q.has('seed') ? (parseInt(q.get('seed'), 10) >>> 0) : null;
let rngState = seedVal === null ? (Math.random() * 2 ** 32) >>> 0 : seedVal;
function rand() {
  rngState = (rngState + 0x6D2B79F5) >>> 0;
  let t = rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

let W, H, DPR;
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize', () => { resize(); if (word) retarget(word, false); });
resize();

// --- sample text into target points -------------------------------------
const off = document.createElement('canvas'), octx = off.getContext('2d');
function sampleWord(w) {
  const pts = [];
  if (!w) return pts;
  off.width = W; off.height = H;
  octx.clearRect(0, 0, W, H);
  let fs = Math.min(H * 0.5, (W * 0.86) / (w.length * 0.62));
  fs = Math.max(fs, 24);
  octx.font = `900 ${fs}px Arial, sans-serif`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle';
  octx.fillStyle = '#fff';
  octx.fillText(w, W / 2, H / 2);
  const gap = Math.max(3, Math.round(fs / 34));
  const data = octx.getImageData(0, 0, W, H).data;
  for (let y = 0; y < H; y += gap)
    for (let x = 0; x < W; x += gap)
      if (data[(y * W + x) * 4 + 3] > 128) pts.push([x, y]);
  return pts;
}

// --- themes ----------------------------------------------------------------
const THEMES = [
  { name: 'NEON',  bg: [11, 11, 18], hues: [174, 42, 340, 210, 96], sat: 85 },
  { name: 'EMBER', bg: [20,  8,  5], hues: [8, 32, 46, 2, 20],      sat: 95 },
  { name: 'ICE',   bg: [ 5, 10, 20], hues: [200, 225, 185, 255, 170], sat: 65 }
];
let themeIdx = (parseInt(q.get('theme'), 10) || 0) % THEMES.length;
function theme() { return THEMES[themeIdx]; }
function applyTheme() {
  document.body.style.background = `rgb(${theme().bg.join(',')})`;
  hue = theme().hues[wordCount % theme().hues.length];
}

// --- particles ------------------------------------------------------------
let parts = [], word = '', hue = THEMES[0].hues[0], wordCount = 0, waves = [];

function retarget(w, explode) {
  word = w;
  hue = theme().hues[wordCount % theme().hues.length];
  if (explode) waves.push({ x: W / 2, y: H / 2, r: 0, v: 16, life: 1 });
  const pts = sampleWord(w);
  // grow/shrink particle pool to match targets
  while (parts.length < pts.length) {
    parts.push({
      x: rand() * W, y: rand() * H,
      vx: 0, vy: 0, tx: 0, ty: 0,
      j: rand() // per-particle jitter for spring feel + color
    });
  }
  if (parts.length > pts.length) parts.length = pts.length;
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    p.tx = pts[i][0]; p.ty = pts[i][1];
    if (explode) {
      const a = rand() * Math.PI * 2, s = 6 + rand() * 22;
      p.vx += Math.cos(a) * s; p.vy += Math.sin(a) * s;
    }
  }
}

function step() {
  const bg = theme().bg;
  ctx.fillStyle = `rgba(${bg[0]},${bg[1]},${bg[2]},0.28)`;
  ctx.fillRect(0, 0, W, H);
  // shockwave rings: expanding front that shoves particles it passes
  const BAND = 46;
  for (const wv of waves) {
    wv.r += wv.v; wv.v *= 0.97; wv.life -= 0.022;
    ctx.strokeStyle = `hsla(${hue},${theme().sat}%,75%,${Math.max(wv.life, 0) * 0.55})`;
    ctx.lineWidth = 2 + wv.life * 10;
    ctx.beginPath(); ctx.arc(wv.x, wv.y, wv.r, 0, Math.PI * 2); ctx.stroke();
  }
  for (const p of parts) {
    for (const wv of waves) {
      const dx = p.x - wv.x, dy = p.y - wv.y, d = Math.hypot(dx, dy) || 1;
      const off = Math.abs(d - wv.r);
      if (off < BAND) {
        const f = (1 - off / BAND) * wv.life * 1.6;
        p.vx += (dx / d) * f; p.vy += (dy / d) * f;
      }
    }
    // magnetic spring toward target, per-particle stiffness
    const k = 0.012 + p.j * 0.02, damp = 0.88;
    p.vx += (p.tx - p.x) * k; p.vy += (p.ty - p.y) * k;
    p.vx *= damp; p.vy *= damp;
    p.x += p.vx; p.y += p.vy;
    const speed = Math.min(Math.hypot(p.vx, p.vy), 14);
    const l = 55 + speed * 3;
    ctx.fillStyle = `hsl(${hue + p.j * 24},${theme().sat}%,${l}%)`;
    const r = 1.1 + p.j * 1.4;
    ctx.fillRect(p.x - r / 2, p.y - r / 2, r, r);
  }
  waves = waves.filter(wv => wv.life > 0);
  requestAnimationFrame(step);
}

// --- input ----------------------------------------------------------------
addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    themeIdx = (themeIdx + 1) % THEMES.length;
    applyTheme();
    document.title = `Shatter Type — ${theme().name}`;
    return;
  }
  if (DEMO) return;
  if (e.key === 'Enter' || e.key === 'Escape') { wordCount++; retarget('', false); return; }
  let w = word;
  if (e.key === 'Backspace') w = w.slice(0, -1);
  else if (e.key.length === 1 && /[a-zA-Z0-9 !?&@#*+.-]/.test(e.key)) {
    if (w.length < 14) w = w + e.key.toUpperCase();
  } else return;
  if (w !== word) { wordCount++; retarget(w, true); }
});

applyTheme();

// --- demo mode: auto-type a word sequence, state in title ------------------
if (DEMO) {
  const words = ['SHATTER', 'REFORM', 'MAGNET', 'BOOM'];
  let wi = 0, ci = 0;
  document.title = 'demo:start';
  (function tick() {
    const target = words[wi];
    if (ci < target.length) {
      ci++;
      wordCount++;
      retarget(target.slice(0, ci), true);
      document.title = `demo:${target.slice(0, ci)}`;
      setTimeout(tick, 260);
    } else if (wi < words.length - 1) {
      wi++; ci = 0;
      setTimeout(tick, 1600);
    } else {
      document.title = `demo:done:${target}`;
    }
  })();
} else {
  retarget('TYPE', false);
}

step();
})();
</script>
</body>
</html>
