<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clockwork Garden</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d0b08}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;top:14px;left:16px;color:#d8b46a;font:13px/1.5 Georgia,serif;
       pointer-events:none;text-shadow:0 1px 4px #000;opacity:.92;transition:opacity 2s}
  #hud b{font-size:17px;letter-spacing:2px;display:block}
  #hud span{color:#9a7f4e;font-size:11px;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><b>&#9881; CLOCKWORK GARDEN</b><span>hover the buds to bloom &middot; click to replant</span></div>
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const Q=new URLSearchParams(location.search);
const DEMO=Q.get('demo')==='1';
const SEED0=Q.has('seed')?(parseInt(Q.get('seed'))||0):1337;
let W,H,DPR;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',()=>{resize();plant(seed);});resize();

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;
  return((t^t>>>14)>>>0)/4294967296;}}
const TAU=Math.PI*2;
const ease=t=>t<0?0:t>1?1:t*t*(3-2*t);
const easeOut=t=>1-Math.pow(1-Math.max(0,Math.min(1,t)),3);
const mix=(c1,c2,u)=>`rgb(${c1.map((v,i)=>Math.round(v+(c2[i]-v)*u)).join(',')})`;

let seed=SEED0,flowers=[],bgGears=[],dust=[],cogs=[],flies=[],clicks=0;

function plant(s){
  const R=mulberry32(s);
  const n=Math.max(4,Math.min(9,Math.floor(W/150)));
  const groundY=H*0.94;
  flowers=[];
  const hues=[[43,'brass'],[25,'copper'],[350,'rose'],[165,'verdigris']];
  for(let i=0;i<n;i++){
    const fx=W*(0.08+0.84*(i+0.2+R()*0.6)/n);
    const hgt=H*(0.32+R()*0.32);
    const pick=hues[R()<0.82?(R()*3|0):3];
    flowers.push({
      x:fx,gy:groundY,h:hgt,
      coils:2+R()*2.5,amp:14+R()*26,phase:R()*TAU,swaySp:0.3+R()*0.5,
      curl:R()<0.6?1+(R()*2|0):0,          // tendril spirals on stem
      petals:6+(R()*8|0),                   // 6..13 teeth on petal gear
      pR:24+R()*26,petalLen:0.32+R()*0.22,  // radius + petal reach
      midT:8+(R()*9|0),midR:0.52+R()*0.12,  // inner gear teeth/ratio
      hue:pick[0]+R()*14-7,sat:38+R()*30,
      dir:R()<0.5?1:-1,sp:0.12+R()*0.35,
      tick:R()<0.6,tickN:6+(R()*6|0),
      jew:(pick[0]+180+R()*40)%360,
      t0:null
    });
  }
  bgGears=[];for(let i=0;i<3;i++)bgGears.push({x:W*(0.15+0.35*i),y:H*(0.12+R()*0.5),
    r:80+R()*140,t:9+(R()*8|0),sp:(R()<0.5?1:-1)*(0.03+R()*0.05)});
  dust=[];for(let i=0;i<50;i++)dust.push({x:R()*W,y:R()*H,s:0.5+R()*1.6,v:4+R()*10,p:R()*TAU});
  cogs=[];for(let i=0;i<10;i++)cogs.push({x:R()*W,y:groundY+2+R()*(H-groundY-4),
    r:3+R()*7,t:5+(R()*4|0),a:R()*TAU});
  flies=[];for(let i=0;i<3;i++)flies.push({x:R()*W,y:H*(0.2+R()*0.35),
    s:0.7+R()*0.6,hue:R()<0.55?46:165,fl:5+R()*4,ph:R()*TAU,wx:R()*TAU,wy:R()*TAU});
}
plant(seed);

function gearPath(cx,cy,rot,rIn,rOut,teeth){
  const st=TAU/teeth;ctx.beginPath();
  for(let i=0;i<teeth;i++){const a=rot+i*st,t=st*0.55;
    ctx.lineTo(cx+Math.cos(a)*rIn,cy+Math.sin(a)*rIn);
    ctx.lineTo(cx+Math.cos(a+t*0.28)*rOut,cy+Math.sin(a+t*0.28)*rOut);
    ctx.lineTo(cx+Math.cos(a+t*0.72)*rOut,cy+Math.sin(a+t*0.72)*rOut);
    ctx.lineTo(cx+Math.cos(a+t)*rIn,cy+Math.sin(a+t)*rIn);}
  ctx.closePath();
}
function tickAngle(t,sp,steps){ // escapement: snap between teeth with quick settle
  const k=t*sp*steps,b=Math.floor(k),f=k-b;
  return (b+(f<0.18?easeOut(f/0.18):1))/steps*TAU;
}
function stemPt(f,u,t){ // point along stem, u in [0,1]
  const sway=Math.sin(t*f.swaySp+f.phase)*6*u;
  const x=f.x+Math.sin(u*f.coils*TAU+f.phase)*f.amp*(1-u*0.55)*Math.sin(u*Math.PI*0.9)+sway;
  return[x,f.gy-u*f.h];
}

let mx=-999,my=-999;
addEventListener('pointermove',e=>{mx=e.clientX;my=e.clientY;});
addEventListener('pointerdown',e=>{mx=e.clientX;my=e.clientY;
  if(!Q.has('seed')){clicks++;seed=SEED0+clicks*7919;plant(seed);}});

const T0=performance.now();
let demoIdx=0,lastBloom=0;

function frame(now){
  let t=(now-T0)/1000;
  if(DEMO)t+=1.5; // demo starts mid-scene
  // ---- day/night cycle: brass day -> patina night, 48s ----
  const CYC=48,dayT=(t/CYC+0.18)%1,half=dayT<0.5,ph=(dayT%0.5)*2,day=half?Math.sin(ph*Math.PI):0;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,mix([5,10,9],[27,21,10],day));
  g.addColorStop(0.6,mix([9,19,16],[46,31,12],day));
  g.addColorStop(1,mix([3,7,6],[14,10,5],day));
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // brass sun / verdigris moon gear arcs across the sky
  const ox=W*(0.10+0.80*ph),oy=H*(0.46-0.34*Math.sin(ph*Math.PI)),orbR=half?26:19;
  const og=ctx.createRadialGradient(ox,oy,2,ox,oy,orbR*4);
  og.addColorStop(0,half?'rgba(255,214,130,0.5)':'rgba(150,230,205,0.35)');
  og.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=og;ctx.fillRect(ox-orbR*4,oy-orbR*4,orbR*8,orbR*8);
  ctx.fillStyle=half?'hsl(44,75%,68%)':'hsl(168,42%,64%)';
  gearPath(ox,oy,t*0.06,orbR*0.78,orbR,12);ctx.fill();
  // background phantom gears
  for(const b of bgGears){ctx.fillStyle='rgba(216,180,106,0.045)';
    gearPath(b.x,b.y,t*b.sp,b.r*0.8,b.r,b.t);ctx.fill();}
  // dust motes (gold by day, verdigris by night)
  ctx.fillStyle=`hsla(${46+119*(1-day)},60%,66%,0.35)`;
  for(const d of dust){const y=(d.y-t*d.v)%H,x=d.x+Math.sin(t*0.4+d.p)*12;
    ctx.globalAlpha=0.12+0.2*Math.sin(t+d.p);
    ctx.fillRect(x,y<0?y+H:y,d.s,d.s);}
  ctx.globalAlpha=1;
  // ground
  ctx.fillStyle='#080604';ctx.fillRect(0,flowers[0]?flowers[0].gy:H*0.94,W,H);
  ctx.strokeStyle='rgba(216,180,106,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H*0.94);ctx.lineTo(W,H*0.94);ctx.stroke();
  for(const c of cogs){ctx.fillStyle='rgba(150,115,60,0.35)';
    gearPath(c.x,c.y,c.a,c.r*0.7,c.r,c.t);ctx.fill();}

  // demo autoplay: staggered blooms, first few already open at t=0
  if(DEMO&&demoIdx<flowers.length){
    flowers[demoIdx].t0=-1+demoIdx*0.7;demoIdx++;}
  let bloomed=0;const open=[];

  for(const f of flowers){
    // hover opens (stays open); bloom is time-based, ~1.2s unfold
    const[tx,ty]=stemPt(f,1,t);
    if(!DEMO&&f.t0===null&&(mx-tx)**2+(my-ty)**2<90*90)f.t0=t;
    const b=ease(f.t0===null?0:(t-f.t0)/1.2);if(b>0.5)bloomed++;
    if(b>0.85)open.push([tx,ty]);
    // ---- spiral stem ----
    ctx.lineCap='round';
    for(const[w,col]of[[4.5,'rgba(60,42,18,0.9)'],[2.2,'hsl(40,45%,38%)'],[0.8,'hsla(46,70%,68%,0.5)']]){
      ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();
      for(let k=0;k<=28;k++){const[px,py]=stemPt(f,k/28,t);k?ctx.lineTo(px,py):ctx.moveTo(px,py);}
      ctx.stroke();}
    // tendril curls
    for(let c=0;c<f.curl;c++){const u=0.35+c*0.25,[sx,sy]=stemPt(f,u,t),d=c%2?1:-1;
      ctx.strokeStyle='hsla(40,50%,45%,0.8)';ctx.lineWidth=1.4;ctx.beginPath();
      for(let k=0;k<=20;k++){const a=k/20*2.6*TAU*0.5,r=10*(1-k/22);
        ctx.lineTo(sx+d*Math.cos(a+f.phase)*r+d*8,sy-6-Math.sin(a+f.phase)*r);}
      ctx.stroke();}
    // ---- gear flower at tip ----
    ctx.save();ctx.translate(tx,ty);
    const s=0.16+0.84*b;ctx.scale(s,s);
    const rot=f.tick?tickAngle(t,f.sp,f.tickN)*f.dir:t*f.sp*TAU*0.25*f.dir;
    // glow when open
    if(b>0.1){const gl=ctx.createRadialGradient(0,0,4,0,0,f.pR*2);
      gl.addColorStop(0,`hsla(${f.hue},80%,60%,${0.22*b})`);gl.addColorStop(1,'transparent');
      ctx.fillStyle=gl;ctx.fillRect(-f.pR*2,-f.pR*2,f.pR*4,f.pR*4);}
    // petal gear (unfolds outward with bloom), metallic radial sheen
    const pOut=f.pR*(1+f.petalLen*b);
    const mg=ctx.createRadialGradient(0,0,f.pR*0.3,0,0,pOut);
    mg.addColorStop(0,`hsl(${f.hue},${f.sat}%,${48+14*b}%)`);
    mg.addColorStop(0.7,`hsl(${f.hue},${f.sat}%,${32+14*b}%)`);
    mg.addColorStop(1,`hsl(${f.hue},${f.sat*0.9}%,${22+10*b}%)`);
    ctx.fillStyle=mg;
    ctx.strokeStyle=`hsla(${f.hue},70%,72%,0.85)`;ctx.lineWidth=1.6;
    gearPath(0,0,rot,f.pR*0.8,pOut,f.petals);ctx.fill();ctx.stroke();
    // mid gear, counter-rotating
    ctx.fillStyle=`hsl(${f.hue},${f.sat*0.8}%,24%)`;
    ctx.strokeStyle=`hsla(${f.hue},60%,60%,0.7)`;ctx.lineWidth=1.2;
    gearPath(0,0,-rot*1.6,f.pR*f.midR*0.68,f.pR*f.midR,f.midT);ctx.fill();ctx.stroke();
    // spokes
    ctx.strokeStyle=`hsla(${f.hue},50%,70%,0.6)`;ctx.lineWidth=1.5;
    for(let k=0;k<4;k++){const a=rot*0.5+k/4*TAU;ctx.beginPath();
      ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3);
      ctx.lineTo(Math.cos(a)*f.pR*f.midR*0.6,Math.sin(a)*f.pR*f.midR*0.6);ctx.stroke();}
    // jewel hub
    const jg=ctx.createRadialGradient(-2,-2,1,0,0,8);
    jg.addColorStop(0,`hsl(${f.jew},90%,80%)`);jg.addColorStop(1,`hsl(${f.jew},70%,30%)`);
    ctx.fillStyle=jg;ctx.beginPath();ctx.arc(0,0,7,0,TAU);ctx.fill();
    ctx.restore();
  }
  // ---- clockwork butterflies: seek open blooms, wander otherwise ----
  for(let i=0;i<flies.length;i++){const bf=flies[i];
    let gx,gy;
    if(open.length){const k=(i+(t/7|0))%open.length; // rotate targets every 7s
      gx=open[k][0]+Math.sin(t*1.1+bf.ph)*14;gy=open[k][1]-22+Math.sin(t*1.7+bf.ph)*8;}
    else{gx=W*(0.5+0.38*Math.sin(t*0.10+bf.wx));gy=H*(0.30+0.20*Math.sin(t*0.13+bf.wy));}
    bf.x+=(gx-bf.x)*0.022;bf.y+=(gy-bf.y)*0.022+Math.sin(t*bf.fl)*0.5;
    const flap=0.22+0.78*Math.abs(Math.sin(t*bf.fl+bf.ph));
    ctx.save();ctx.translate(bf.x,bf.y);ctx.scale(bf.s,bf.s);
    ctx.rotate(Math.sin(t*0.9+bf.ph)*0.18);
    if(day<0.5){const bg=ctx.createRadialGradient(0,0,2,0,0,26); // night glow
      bg.addColorStop(0,`hsla(${bf.hue},80%,70%,${0.25*(1-day)})`);bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg;ctx.fillRect(-26,-26,52,52);}
    for(const sd of[-1,1]){ctx.save();ctx.scale(sd*flap,1);
      ctx.fillStyle=`hsla(${bf.hue},58%,${50+14*day}%,0.85)`;
      ctx.strokeStyle=`hsla(${bf.hue},80%,78%,0.9)`;ctx.lineWidth=1.1;
      ctx.beginPath();ctx.ellipse(9,-4,9,5,-0.45,0,TAU);ctx.fill();ctx.stroke(); // fore wing
      ctx.beginPath();ctx.ellipse(7,4,6.5,4,0.5,0,TAU);ctx.fill();ctx.stroke();  // hind wing
      ctx.strokeStyle=`hsla(${bf.hue},60%,85%,0.5)`;ctx.lineWidth=0.7;           // rivet vein
      ctx.beginPath();ctx.moveTo(2,-1);ctx.lineTo(14,-6);ctx.stroke();
      ctx.restore();}
    ctx.strokeStyle='hsla(44,70%,72%,0.8)';ctx.lineWidth=0.9;                    // gear thorax
    gearPath(0,-1,t*2.2,2.6,4,6);ctx.stroke();
    ctx.fillStyle='hsl(40,50%,42%)';ctx.beginPath();ctx.ellipse(0,1,2,6.5,0,0,TAU);ctx.fill();
    ctx.fillStyle=`hsl(${(bf.hue+180)%360},85%,70%)`;ctx.beginPath();ctx.arc(0,-6.5,2,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(230,200,140,0.8)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(-3.5,-12);ctx.moveTo(0,-8);ctx.lineTo(3.5,-12);ctx.stroke();
    ctx.restore();
  }
  // night patina wash
  ctx.fillStyle=`rgba(64,128,108,${0.10*(1-day)})`;ctx.fillRect(0,0,W,H);
  if(DEMO)document.title=`Clockwork Garden — ${bloomed}/${flowers.length} bloomed t=${t.toFixed(1)}`;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
if(DEMO)setTimeout(()=>document.getElementById('hud').style.opacity=0.35,4000);
</script>
</body>
</html>
