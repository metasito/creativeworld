<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04121f">
<title>Bubble Diver</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#04121f; overflow:hidden; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; color:#dff3ff;
         display:flex; align-items:center; justify-content:center; }
  #wrap { position:relative; width:100%; height:100%; max-width:520px; margin:0 auto; }
  canvas { display:block; width:100%; height:100%; touch-action:none; background:#04121f; }

  .hud { position:absolute; top:0; left:0; right:0; padding:14px 16px;
         display:flex; align-items:center; gap:12px; pointer-events:none; }
  .air { flex:1; height:16px; border-radius:10px; background:rgba(255,255,255,.12);
         overflow:hidden; box-shadow:inset 0 0 0 1px rgba(255,255,255,.15); }
  .air > i { display:block; height:100%; width:100%;
             background:linear-gradient(90deg,#ff5a6e,#ffd15a,#4be0ff);
             transition:width .12s linear; }
  .lbl { font-size:12px; letter-spacing:.14em; opacity:.8; text-transform:uppercase; }
  .depth { position:absolute; top:40px; right:16px; font-size:12px; opacity:.7;
           letter-spacing:.1em; pointer-events:none; }

  .overlay { position:absolute; inset:0; display:flex; flex-direction:column;
             align-items:center; justify-content:center; text-align:center; gap:18px;
             padding:30px; background:rgba(4,12,24,.72); backdrop-filter:blur(3px);
             transition:opacity .25s; }
  .overlay.hide { opacity:0; pointer-events:none; }
  .overlay h1 { font-size:34px; font-weight:800; letter-spacing:.02em;
                background:linear-gradient(90deg,#4be0ff,#ffd15a); -webkit-background-clip:text;
                background-clip:text; color:transparent; }
  .overlay p { font-size:15px; line-height:1.5; opacity:.85; max-width:300px; }
  .big { font-size:44px; }
  button { pointer-events:auto; font:inherit; font-weight:700; font-size:17px;
           color:#04121f; border:none; border-radius:40px; padding:15px 40px; cursor:pointer;
           background:linear-gradient(90deg,#4be0ff,#7affd0); min-height:48px; min-width:120px;
           box-shadow:0 8px 26px rgba(75,224,255,.35); }
  button:active { transform:translateY(1px); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div class="hud">
    <span class="lbl">Air</span>
    <div class="air"><i id="airbar"></i></div>
  </div>
  <div class="depth" id="depth"></div>

  <div class="overlay" id="ovStart">
    <h1>Bubble Diver</h1>
    <p>Drag the diver to swim <b>up to the surface</b> before your air runs out. Dodge the swirling <b>whirlpools</b> — they shove you back down.</p>
    <button id="btnStart">Dive</button>
  </div>

  <div class="overlay hide" id="ovEnd">
    <h1 id="endTitle">Surfaced!</h1>
    <p id="endMsg"></p>
    <button id="btnAgain">Dive Again</button>
  </div>
</div>

<script>
(function(){
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  const airbar = document.getElementById('airbar'), depthEl = document.getElementById('depth');
  const ovStart = document.getElementById('ovStart'), ovEnd = document.getElementById('ovEnd');
  const endTitle = document.getElementById('endTitle'), endMsg = document.getElementById('endMsg');
  const demo = new URLSearchParams(location.search).has('demo');

  let W=0, H=0, DPR=1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = W*DPR; cv.height = H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);

  // world: total depth the diver must climb (in px of virtual travel)
  const DEPTH = 1300;         // start depth; surface = 0
  const SURFACE_Y = 60;       // screen y considered "surfaced" band
  const state = {
    phase:'start',           // start | play | win | lose
    diver:{x:0,y:0,vx:0,vy:0},
    depth:DEPTH,             // remaining depth to climb
    air:1,
    whirls:[],
    bubbles:[],
    t:0,
    target:null,            // pointer target
    best: +(localStorage.getItem('bd_best')||0)
  };

  function reset(){
    state.phase='start';
    state.diver.x = W/2; state.diver.y = H*0.62;
    state.diver.vx=0; state.diver.vy=0;
    state.depth = DEPTH; state.air = 1; state.t=0; state.target=null;
    state.whirls = []; state.bubbles = [];
    seedWhirls();
    for(let i=0;i<26;i++) state.bubbles.push(mkBubble());
    ovEnd.classList.add('hide');
    ovStart.classList.remove('hide');
    document.title = 'Bubble Diver';
  }
  function mkBubble(){
    return { x:Math.random()*W, y:Math.random()*H, r:1+Math.random()*3, s:12+Math.random()*30 };
  }
  function seedWhirls(){
    state.whirls = [];
    // spread whirlpools through the depth column
    const n = 7;
    for(let i=0;i<n;i++){
      state.whirls.push({
        depth: (i+0.5)/n * (DEPTH-300) + 150,   // world-depth where it sits
        x: 60 + Math.random()*(Math.max(W,320)-120),
        r: 46 + Math.random()*34,
        drift: (Math.random()<0.5?-1:1)*(18+Math.random()*26),
        spin: (Math.random()<0.5?-1:1)*(1.4+Math.random()),
        ph: Math.random()*6.28
      });
    }
  }

  // map a world-depth to a screen-y given diver's current depth
  // diver sits at fixed screen band; world scrolls
  function worldToScreen(d){
    // diver's world-depth = state.depth, drawn at state.diver.y
    return state.diver.y + (state.depth - d);
  }

  function start(){
    if(state.phase==='play') return;
    reset();
    state.phase='play';
    ovStart.classList.add('hide');
  }
  function end(win){
    state.phase = win ? 'win' : 'lose';
    endTitle.textContent = win ? 'Surfaced!' : 'Out of Air';
    const reached = Math.round((1 - state.depth/DEPTH)*100);
    if(win){
      const airPct = Math.round(state.air*100);
      if(airPct > state.best){ state.best=airPct; localStorage.setItem('bd_best',airPct); }
      endMsg.textContent = `You broke the surface with ${airPct}% air to spare. Best: ${state.best}%.`;
    } else {
      endMsg.textContent = `You sank at ${reached}% of the climb. Keep dodging those whirlpools.`;
    }
    ovEnd.classList.remove('hide');
    document.title = (win?'WIN':'LOSE') + ' air:'+Math.round(state.air*100)+'% reached:'+reached+'%';
  }

  // ---- input (pointer only) ----
  function pointAt(e){
    const r = cv.getBoundingClientRect();
    return { x:(e.clientX-r.left), y:(e.clientY-r.top) };
  }
  cv.addEventListener('pointerdown', e=>{
    cv.setPointerCapture(e.pointerId);
    if(state.phase==='play') state.target = pointAt(e);
  });
  cv.addEventListener('pointermove', e=>{
    if(state.phase==='play' && state.target) state.target = pointAt(e);
  });
  cv.addEventListener('pointerup', ()=>{ state.target=null; });
  cv.addEventListener('pointercancel', ()=>{ state.target=null; });

  document.getElementById('btnStart').addEventListener('click', start);
  document.getElementById('btnAgain').addEventListener('click', ()=>{ reset(); start(); });

  // ---- update ----
  function update(dt){
    state.t += dt;
    // bubbles always rise (ambient)
    for(const b of state.bubbles){
      b.y -= b.s*dt; b.x += Math.sin(state.t*0.6+b.y*0.05)*6*dt;
      if(b.y < -6){ b.y = H+6; b.x = Math.random()*W; }
    }
    if(state.phase!=='play') return;

    // air drains; faster the deeper you are
    const drain = 0.03 + 0.022*(state.depth/DEPTH);
    state.air -= drain*dt;
    if(state.air<=0){ state.air=0; end(false); return; }

    const d = state.diver;
    // demo autopilot: aim upward, weave away from nearest on-screen whirl
    let tgt = state.target;
    if(demo){
      let ax = W/2, ay = -H*0.6;               // aim well above so the diver climbs hard
      let nearest=null, nd=1e9;
      for(const w of state.whirls){
        const sy = worldToScreen(w.depth);
        if(sy<-80||sy>H+80) continue;
        const dx=w.x-d.x, dy=sy-d.y, dist=Math.hypot(dx,dy);
        if(dist<nd){ nd=dist; nearest={w,sy,dx,dy,dist}; }
      }
      if(nearest && nearest.dist < nearest.w.r+70){
        ax = d.x - nearest.dx*2.2;              // steer away horizontally
      }
      ax = Math.max(30, Math.min(W-30, ax));
      tgt = {x:ax, y:ay};
    }

    // swim toward target (spring)
    if(tgt){
      d.vx += (tgt.x - d.x)*5.2*dt;
      d.vy += (tgt.y - d.y)*5.2*dt;
    }
    // gentle sink when idle
    d.vy += 42*dt;
    d.vx *= Math.pow(0.02, dt);
    d.vy *= Math.pow(0.02, dt);

    // whirlpool forces
    for(const w of state.whirls){
      w.x += w.drift*dt;
      if(w.x < w.r*0.5 || w.x > W-w.r*0.5) w.drift*=-1;
      w.x = Math.max(w.r*0.5, Math.min(W-w.r*0.5, w.x));
      const sy = worldToScreen(w.depth);
      const dx = d.x-w.x, dy = d.y-sy, dist=Math.hypot(dx,dy)||1;
      if(dist < w.r*2.4){
        const f = (1 - dist/(w.r*2.4));
        // swirl (tangential) + push down/out
        const nx=dx/dist, ny=dy/dist;
        const tx=-ny*w.spin, ty=nx*w.spin;
        d.vx += (tx*160 + nx*40)*f*dt;
        d.vy += (ty*160 + ny*40 + 120)*f*dt;   // net downward shove
      }
    }

    d.x += d.vx*dt; d.y += d.vy*dt;
    // keep diver in a vertical band; convert vertical motion into depth climb
    const bandTop = H*0.30, bandBot = H*0.72;
    if(d.y < bandTop){ state.depth -= (bandTop - d.y); d.y = bandTop; d.vy*=0.4; }
    if(d.y > bandBot){ state.depth += (d.y - bandBot); d.y = bandBot; d.vy*=0.4; }
    state.depth = Math.max(0, Math.min(DEPTH+200, state.depth));
    d.x = Math.max(16, Math.min(W-16, d.x));

    // reached surface?
    if(state.depth <= 0){ end(true); return; }

    // live title while playing (for demo assertions)
    if(demo){
      document.title = 'DIVE air:'+Math.round(state.air*100)+'% reached:'+Math.round((1-state.depth/DEPTH)*100)+'%';
    }
  }

  // ---- render ----
  function draw(){
    // water gradient by depth
    const depthFrac = state.depth/DEPTH;
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, shade(depthFrac, true));
    g.addColorStop(1, shade(depthFrac, false));
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // surface shimmer near top when close
    const surfSy = worldToScreen(0);
    if(surfSy > -40){
      ctx.save();
      ctx.globalAlpha = 0.9;
      const sy = Math.max(0, surfSy);
      const sg = ctx.createLinearGradient(0, sy-40, 0, sy+30);
      sg.addColorStop(0,'rgba(180,240,255,0)');
      sg.addColorStop(1,'rgba(180,240,255,.55)');
      ctx.fillStyle=sg; ctx.fillRect(0, sy-40, W, 70);
      ctx.strokeStyle='rgba(220,250,255,.9)'; ctx.lineWidth=3;
      ctx.beginPath();
      for(let x=0;x<=W;x+=12){ ctx.lineTo(x, sy + Math.sin(x*0.05+state.t*3)*4); }
      ctx.stroke();
      ctx.restore();
    }

    // ambient bubbles
    ctx.fillStyle='rgba(255,255,255,.16)';
    for(const b of state.bubbles){
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.283); ctx.fill();
    }

    // whirlpools
    for(const w of state.whirls){
      const sy = worldToScreen(w.depth);
      if(sy<-120||sy>H+120) continue;
      ctx.save();
      ctx.translate(w.x, sy);
      ctx.rotate(state.t*w.spin*0.8);
      for(let i=0;i<3;i++){
        ctx.beginPath();
        const rr = w.r*(1-i*0.26);
        ctx.strokeStyle = `rgba(90,${170-i*30},255,${0.5-i*0.12})`;
        ctx.lineWidth = 5-i;
        for(let a=0;a<6.5;a+=0.25){
          const rad = rr*(1 - a*0.06);
          const x=Math.cos(a+i)*rad, y=Math.sin(a+i)*rad;
          a===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0,0,5,0,6.283);
      ctx.fillStyle='rgba(10,30,60,.8)'; ctx.fill();
      ctx.restore();
    }

    // diver
    const d = state.diver;
    ctx.save();
    ctx.translate(d.x, d.y);
    const tilt = Math.max(-0.5,Math.min(0.5, d.vx*0.01));
    ctx.rotate(tilt);
    // body
    ctx.fillStyle='#ffd15a';
    ctx.beginPath(); ctx.ellipse(0,0,13,17,0,0,6.283); ctx.fill();
    // mask
    ctx.fillStyle='#8fe9ff';
    ctx.beginPath(); ctx.ellipse(0,-4,8,6,0,0,6.283); ctx.fill();
    // tank glow
    ctx.strokeStyle='rgba(75,224,255,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,19,0,6.283); ctx.stroke();
    // trailing bubble
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.arc(6, 16+Math.sin(state.t*8)*3, 2.5,0,6.283); ctx.fill();
    ctx.restore();

    // HUD
    airbar.style.width = (state.air*100).toFixed(1)+'%';
    depthEl.textContent = state.phase==='play'
      ? Math.round(state.depth) + ' m to surface'
      : '';
  }
  function shade(f, top){
    // f=1 deep(dark), f=0 shallow(bright)
    const deep = top? [6,26,48] : [2,10,22];
    const shal = top? [40,120,170] : [12,60,110];
    const c = deep.map((v,i)=> Math.round(v + (shal[i]-v)*(1-f)));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }

  // ---- loop ----
  let last=performance.now();
  function frame(now){
    let dt=(now-last)/1000; last=now;
    if(dt>0.05) dt=0.05;
    update(dt); draw();
    requestAnimationFrame(frame);
  }

  // test hooks
  window.__diver = {
    forceWin(){ if(state.phase!=='play'){ reset(); start(); } state.depth=0; state.air=0.5; end(true); return state.phase; },
    forceLose(){ if(state.phase!=='play'){ reset(); start(); } state.air=0; end(false); return state.phase; },
    state(){ return {phase:state.phase, air:state.air, depth:state.depth}; }
  };

  resize();
  reset();
  requestAnimationFrame(frame);
  if(demo){ setTimeout(start, 400); }
})();
</script>
</body>
</html>
