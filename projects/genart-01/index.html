<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Silk Fields</title>
<style>
* { margin: 0; }
html, body { height: 100%; background: #0c0b10; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#tag { position: fixed; left: 18px; bottom: 14px; color: rgba(255,255,255,.55);
  font: 12px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif; letter-spacing: .08em; pointer-events: none; }
#tag b { color: rgba(255,255,255,.85); font-weight: 600; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tag"><b>SILK FIELDS</b> · seed <span id="seed"></span> · click = new · S = save PNG</div>

<script>
const cv = document.getElementById("c"), x = cv.getContext("2d");
let W, H; const DPR = Math.min(devicePixelRatio, 2);
const fit = () => { W = cv.width = innerWidth * DPR; H = cv.height = innerHeight * DPR; };
fit();

/* deterministic PRNG */
const mulberry = s => () => (s = s + 0x6D2B79F5 | 0, ((Math.imul(s ^ s >>> 15, 1 | s) + s | 0) >>> 0) / 4294967296);
let seed, rnd, frame = 0, parts = [], hueBase, hueSpan, fieldZ, bg;

/* smooth value noise via layered sines (cheap, seedable) */
let k1, k2, k3, k4;
function field(px, py) {
  const s = 0.0011 / DPR * 1.4;
  return Math.sin(px * s * k1 + fieldZ) * Math.cos(py * s * k2 - fieldZ * .7) * 2.1
       + Math.sin((px + py) * s * k3) * 1.3 + Math.cos(py * s * k4 + px * s * .5) * .9;
}

function restart(newSeed) {
  seed = newSeed ?? Math.floor(Math.random() * 1e9);
  const q = new URLSearchParams(location.search).get("seed");
  if (q !== null && newSeed === undefined) seed = +q;
  rnd = mulberry(seed);
  document.getElementById("seed").textContent = seed;
  hueBase = rnd() * 360; hueSpan = 40 + rnd() * 140; fieldZ = rnd() * 9;
  k1 = .6 + rnd() * 2.4; k2 = .6 + rnd() * 2.4; k3 = .4 + rnd() * 2; k4 = .4 + rnd() * 2;
  const dark = rnd() < .8;
  bg = dark ? `hsl(${(hueBase + 180) % 360}, 30%, ${4 + rnd() * 6}%)` : `hsl(${(hueBase + 160) % 360}, 38%, ${90 + rnd() * 5}%)`;
  x.fillStyle = bg; x.fillRect(0, 0, W, H);
  parts = [];
  const n = 2600;
  for (let i = 0; i < n; i++) {
    // seed particles along a few "silk threads" plus scatter
    const th = Math.floor(rnd() * 5), tt = rnd();
    const jx = (rnd() - .5) * W * .18, jy = (rnd() - .5) * H * .18;
    parts.push({
      x: rnd() < .6 ? W * (.15 + .7 * tt) + jx : rnd() * W,
      y: rnd() < .6 ? H * (.2 + .12 * th) + H * .35 * Math.sin(tt * 6 + th) * .5 + jy : rnd() * H,
      h: (hueBase + rnd() * hueSpan) % 360,
      l: dark ? 55 + rnd() * 30 : 25 + rnd() * 35,
      a: .05 + rnd() * .3, sp: .5 + rnd() * 1.6, life: 200 + rnd() * 500
    });
  }
  frame = 0;
}

function stepOnce() {
  frame++;
  for (const p of parts) {
    if (p.life-- < 0) continue;
    const a = field(p.x, p.y);
    const nx = p.x + Math.cos(a) * p.sp * DPR, ny = p.y + Math.sin(a) * p.sp * DPR;
    x.strokeStyle = `hsla(${p.h}, 75%, ${p.l}%, ${p.a})`;
    x.lineWidth = DPR * .8;
    x.beginPath(); x.moveTo(p.x, p.y); x.lineTo(nx, ny); x.stroke();
    p.x = nx; p.y = ny;
    if (p.x < 0 || p.x > W || p.y < 0 || p.y > H) p.life = -1;
  }
}

function tick() {
  stepOnce();
  document.title = `Silk Fields · seed ${seed} · frame ${frame}`;
  requestAnimationFrame(tick);
}

addEventListener("pointerdown", () => restart());
addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "s") {
    const a = document.createElement("a");
    a.download = `silk-fields-${seed}.png`; a.href = cv.toDataURL("image/png"); a.click();
  }
});
addEventListener("resize", () => { fit(); restart(seed); });

restart();
/* ?frames=600 — synchronous pre-render (headless screenshot hook) */
const pre = +(new URLSearchParams(location.search).get("frames") || 0);
for (let i = 0; i < pre; i++) stepOnce();
requestAnimationFrame(tick);
</script>
</body>
</html>
