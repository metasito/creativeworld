<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Liquid Chrome</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;overflow:hidden;cursor:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;left:18px;top:16px;color:#cdd6ff;z-index:2;pointer-events:none;
    text-shadow:0 1px 8px rgba(0,0,0,.8);letter-spacing:.02em}
  #hud h1{margin:0;font-size:15px;font-weight:600;
    background:linear-gradient(90deg,#e9f0ff,#8fa4d8);-webkit-background-clip:text;background-clip:text;color:transparent}
  #hud p{margin:3px 0 0;font-size:11px;opacity:.6}
  @media (max-width:420px){#hud h1{font-size:13px}}
</style>
</head>
<body>
<div id="hud"><h1>LIQUID CHROME</h1><p>move — the metal follows &amp; swallows the droplets</p></div>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const lo = document.createElement('canvas'), lc = lo.getContext('2d', {willReadFrequently:true});
const SCALE = 5;                 // field cell size in device px
let W, H, gw, gh, img, buf, field;
const demo = new URLSearchParams(location.search).has('demo');

// chrome environment ramp: alternating dark/light bands = reflective metal
const STOPS = [
  [0.00, 12,16,30],[0.18, 70,84,120],[0.34, 235,242,255],[0.46, 150,168,205],
  [0.58, 30,36,58],[0.70, 120,140,180],[0.82, 245,248,255],[1.00, 40,50,80]
];
function ramp(t){
  t = t<0?0:t>1?1:t;
  for(let i=1;i<STOPS.length;i++){
    if(t<=STOPS[i][0]){
      const a=STOPS[i-1], b=STOPS[i], k=(t-a[0])/(b[0]-a[0]);
      return [a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k, a[3]+(b[3]-a[3])*k];
    }
  }
  return [STOPS[8]?STOPS[8][1]:40,50,80];
}
// precompute 256-entry ramp LUT
const LUT = new Float32Array(256*3);
for(let i=0;i<256;i++){const c=ramp(i/255);LUT[i*3]=c[0];LUT[i*3+1]=c[1];LUT[i*3+2]=c[2];}

function resize(){
  W = cv.width = innerWidth; H = cv.height = innerHeight;
  gw = Math.ceil(W/SCALE); gh = Math.ceil(H/SCALE);
  lo.width = gw; lo.height = gh;
  img = lc.createImageData(gw, gh); buf = img.data;
  field = new Float32Array(gw*gh);
}
addEventListener('resize', resize); resize();

// blobs: index 0 = main (cursor), rest = droplets attracted to it
const N = 9;
const blobs = [];
for(let i=0;i<N;i++){
  blobs.push({x:Math.random()*W, y:Math.random()*H,
    vx:0, vy:0, r: i===0? 130 : 34+Math.random()*30,
    tr: i===0? 130 : 34+Math.random()*30});
}
let mx = W/2, my = H/2, mt = 0;
addEventListener('pointermove', e=>{ mx=e.clientX; my=e.clientY; }, {passive:true});

function step(){
  mt += 0.016;
  if(demo){ // Lissajous autopilot cursor
    mx = W*(0.5+0.34*Math.sin(mt*0.7));
    my = H*(0.5+0.34*Math.sin(mt*1.1+0.6));
  }
  const main = blobs[0];
  main.x += (mx-main.x)*0.12; main.y += (my-main.y)*0.12; // smooth lag
  for(let i=1;i<N;i++){
    const b=blobs[i], dx=main.x-b.x, dy=main.y-b.y, d=Math.hypot(dx,dy)+1;
    // gentle attraction toward main + wander
    b.vx += dx/d*0.25 + (Math.random()-0.5)*0.3;
    b.vy += dy/d*0.25 + (Math.random()-0.5)*0.3;
    b.vx*=0.94; b.vy*=0.94;
    b.x+=b.vx; b.y+=b.vy;
    if(d<b.r*0.5){ // swallowed → respawn at edge (split back out)
      const a=Math.random()*6.283, R=Math.max(W,H)*0.55;
      b.x=main.x+Math.cos(a)*R; b.y=main.y+Math.sin(a)*R; b.vx=b.vy=0;
      b.tr=30+Math.random()*34;
    }
    b.r += (b.tr-b.r)*0.05;
  }
}

function frame(){
  step();
  field.fill(0);
  // accumulate metaball field on low-res grid
  for(let bi=0;bi<N;bi++){
    const b=blobs[bi], R2=b.r*b.r;
    const radPx=b.r*3.4, edge=R2/(radPx*radPx+80); // subtract edge → smooth decay to 0, no box seams
    const cx=b.x/SCALE, cy=b.y/SCALE, rad=radPx/SCALE;
    const x0=Math.max(0,(cx-rad)|0), x1=Math.min(gw,(cx+rad+1)|0);
    const y0=Math.max(0,(cy-rad)|0), y1=Math.min(gh,(cy+rad+1)|0);
    for(let y=y0;y<y1;y++){
      const dy=(y-cy)*SCALE, dy2=dy*dy, row=y*gw;
      for(let x=x0;x<x1;x++){
        const dx=(x-cx)*SCALE, v=R2/(dx*dx+dy2+80)-edge;
        if(v>0) field[row+x] += v;
      }
    }
  }
  const T=1.0; // iso threshold
  for(let y=0;y<gh;y++){
    for(let x=0;x<gw;x++){
      const idx=y*gw+x, f=field[idx], p=idx*4;
      if(f<T*0.55){ // background: faint radial vignette glow
        buf[p]=5; buf[p+1]=6; buf[p+2]=12; buf[p+3]=255; continue;
      }
      // surface normal from field gradient
      const l=x>0?field[idx-1]:f, r=x<gw-1?field[idx+1]:f;
      const u=y>0?field[idx-gw]:f, d=y<gh-1?field[idx+gw]:f;
      let nx=l-r, ny=u-d;
      const nl=Math.hypot(nx,ny)+1e-4; nx/=nl; ny/=nl;
      // environment lookup: vertical reflection band + horizontal tint
      let t = 0.5 + 0.34*ny + 0.12*nx;
      const li=((t<0?0:t>1?1:t)*255)|0, L=li*3;
      let rr=LUT[L], gg=LUT[L+1], bb=LUT[L+2];
      // rim / fresnel highlight near silhouette
      const rim = f<T*0.9 ? (1-(f-T*0.55)/(T*0.35)) : 0;
      const sp = Math.pow(rim<0?0:rim,1.5)*120;
      rr+=sp; gg+=sp; bb+=sp+18;
      buf[p]=rr>255?255:rr; buf[p+1]=gg>255?255:gg; buf[p+2]=bb>255?255:bb; buf[p+3]=255;
    }
  }
  lc.putImageData(img,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(lo,0,0,gw,gh,0,0,W,H);
  if(demo) document.title = 'chrome '+(blobs[0].x|0)+','+(blobs[0].y|0);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
